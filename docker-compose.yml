services:
  frontend:
    build:
      context: .
      dockerfile: docker/frontend.Dockerfile
    ports:
      - "3101:3101"
    environment:
      - PORT=3101
      - NEXT_PUBLIC_API_BASE_URL=http://localhost:8101
    depends_on:
      - backend

  backend:
    build:
      context: .
      dockerfile: docker/backend.Dockerfile
    ports:
      - "8101:8101"
    environment:
      - MILVUS_HOST=host.docker.internal
      - MILVUS_PORT=19530
      - LOG_LEVEL=INFO
      - BACKEND_PORT=8101
      - OLLAMA_BASE_URL=http://192.168.28.100:11434
      - OLLAMA_MODEL=llama3
      - OLLAMA_TIMEOUT_SECONDS=120
